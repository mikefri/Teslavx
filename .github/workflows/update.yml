name: Mise a jour du contenu

on:
  schedule:
    # Cette ligne dit à GitHub de lancer le script toutes les 12 heures
    - cron: '0 */12 * * *'
  # Cette ligne permet de lancer le script manuellement depuis l'onglet "Actions"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Copie tes fichiers sur le serveur virtuel
      - name: Checkout du depot
        uses: actions/checkout@v3

      # 2. Installe Python
      - name: Installation de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. Installe les outils de scraping (BeautifulSoup et Requests)
      - name: Installation des librairies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 4. Lance ton script scraper.py
      - name: Execution du scraper
        run: python scraper.py

      # 5. Enregistre le fichier data.json genere sur ton GitHub
      - name: Sauvegarde des donnees
        run: |
          git config --global user.name 'Bot-Scraper'
          git config --global user.email 'bot@github.com'
          git add data.json
          # On commit seulement s'il y a des changements pour eviter les erreurs
          git commit -m "Mise à jour automatique des vidéos" || echo "Aucun changement"
          git push
