<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eporner Playlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --red: #e8132b;
      --red-dark: #b50f22;
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    h1, .bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

    /* Search */
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      transition: border-color 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--red); }

    /* Card */
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .video-card:hover { border-color: var(--red); transform: translateY(-2px); }

    /* Playlist tabs */
    .playlist-tab {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .playlist-tab.active { background: var(--red); border-color: var(--red); color: white; }
    .playlist-tab:not(.active):hover { border-color: #444; color: var(--text); }

    /* Playlist item */
    .pl-item {
      display: flex;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .pl-item:hover { border-color: #444; }
    .pl-item.playing { border-color: var(--red); background: rgba(232,19,43,0.07); }

    /* Btn */
    .btn-red { background: var(--red); color: white; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500; transition: background 0.15s; }
    .btn-red:hover { background: var(--red-dark); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500; transition: all 0.15s; }
    .btn-ghost:hover { border-color: #555; background: #222; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* Dropdown add-to */
    .dropdown {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      z-index: 50;
      min-width: 200px;
      overflow: hidden;
    }
    .dropdown-item { padding: 10px 14px; font-size: 13px; cursor: pointer; transition: background 0.1s; }
    .dropdown-item:hover { background: var(--surface2); }

    /* Player */
    #playerContainer { background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }

    /* Now playing indicator */
    .now-playing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

    /* Notification toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 13px; z-index: 200;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* Progress bar in playlist */
    .progress-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 6px; }
    .progress-fill { height: 100%; background: var(--red); border-radius: 1px; transition: width 0.3s; }

    input[type="text"] { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body>

<div class="max-w-[1400px] mx-auto p-4 pb-16">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-4xl" style="color:var(--red)">EPORNER</h1>
    <span class="text-sm text-gray-500">Playlist Manager</span>
  </div>

  <!-- Search -->
  <div class="flex gap-2 mb-6">
    <input id="searchInput" type="text" placeholder="Rechercher des vidéos…"
           class="search-input flex-1 rounded-lg px-4 py-3 text-sm">
    <button onclick="searchVideos()"
            class="btn-red px-6 py-3 rounded-lg font-medium text-sm">Chercher</button>
  </div>

  <div class="flex gap-5">

    <!-- Main -->
    <div class="flex-1 min-w-0">

      <!-- Player -->
      <div id="playerContainer" class="hidden mb-5">
        <iframe id="videoPlayer" width="100%" height="480" allowfullscreen style="display:block"></iframe>
        <div class="p-4 flex items-start justify-between gap-4" style="background:#0d0d0d">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <div class="now-playing-dot"></div>
              <span class="text-xs text-red-400 font-medium uppercase tracking-widest">En lecture</span>
            </div>
            <h2 id="videoTitle" class="font-semibold text-base"></h2>
          </div>
          <div class="flex gap-2 shrink-0">
            <button onclick="playPrev()" class="btn-ghost text-xs px-3 py-2">⏮ Préc.</button>
            <button onclick="playNext()" class="btn-ghost text-xs px-3 py-2">Suiv. ⏭</button>
          </div>
        </div>
      </div>

      <!-- Grid -->
      <div id="videoGrid" class="video-grid"></div>
    </div>

    <!-- Sidebar -->
    <div style="width:340px; flex-shrink:0">
      <div style="background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; position:sticky; top:16px;">

        <!-- Playlist header -->
        <div class="p-4" style="border-bottom:1px solid var(--border)">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-sm">MES PLAYLISTS</h2>
            <button onclick="openCreateModal()" class="btn-red text-xs px-3 py-1.5">+ Nouvelle</button>
          </div>
          <!-- Tabs -->
          <div id="playlistTabs" class="flex gap-2 overflow-x-auto pb-1" style="scrollbar-width:none"></div>
        </div>

        <!-- Active playlist info -->
        <div id="plHeader" class="px-4 py-3 flex items-center justify-between" style="border-bottom:1px solid var(--border); display:none!important">
          <div>
            <p id="plName" class="font-semibold text-sm"></p>
            <p id="plCount" class="text-xs" style="color:var(--muted)"></p>
          </div>
          <div class="flex gap-2">
            <button onclick="playAll()" class="btn-red text-xs px-3 py-1.5">▶ Tout lire</button>
            <button onclick="openRenameModal()" class="btn-ghost text-xs px-2 py-1.5">✏</button>
            <button onclick="deleteCurrentPlaylist()" class="btn-ghost text-xs px-2 py-1.5" style="color:#e84343">🗑</button>
          </div>
        </div>

        <!-- Playlist items -->
        <div id="playlistItems" class="overflow-auto p-3 space-y-2" style="max-height:55vh"></div>

        <!-- Footer -->
        <div class="p-3" style="border-top:1px solid var(--border)">
          <button onclick="clearCurrentPlaylist()" class="btn-ghost w-full text-xs py-2">Vider cette playlist</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Dropdown add-to -->
<div id="addDropdown" class="dropdown hidden" style="position:fixed"></div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 id="modalTitle" class="font-semibold text-base mb-4"></h3>
    <input id="modalInput" type="text" class="search-input w-full rounded-lg px-3 py-2.5 text-sm mb-4" placeholder="Nom de la playlist…">
    <div class="flex gap-2 justify-end">
      <button onclick="closeModal()" class="btn-ghost px-4 py-2">Annuler</button>
      <button id="modalConfirm" class="btn-red px-4 py-2">Créer</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ─── State ────────────────────────────────────────────────────────────────
  let playlists = JSON.parse(localStorage.getItem('eplaylists') || '{}');
  let activePlaylistId = localStorage.getItem('eplActiveId') || null;
  let currentVideoId = null;
  let currentPlayingIndex = -1;
  let modalMode = 'create'; // 'create' | 'rename'

  // Ensure at least one default playlist
  if (Object.keys(playlists).length === 0) {
    const id = uid();
    playlists[id] = { name: 'Ma playlist', videos: [] };
    activePlaylistId = id;
    save();
  }
  if (!activePlaylistId || !playlists[activePlaylistId]) {
    activePlaylistId = Object.keys(playlists)[0];
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function save() {
    localStorage.setItem('eplaylists', JSON.stringify(playlists));
    localStorage.setItem('eplActiveId', activePlaylistId);
  }
  function activePl() { return playlists[activePlaylistId] || null; }

  // ─── Init ─────────────────────────────────────────────────────────────────
  renderTabs();
  renderPlaylistItems();

  // ─── Search ───────────────────────────────────────────────────────────────
  async function searchVideos() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return toast('Entre un mot-clé 🔍');
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '<p style="color:var(--muted);font-size:14px;grid-column:1/-1">Recherche en cours…</p>';
    try {
      const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${encodeURIComponent(query)}&per_page=32&thumbsize=big&order=latest`);
      const data = await res.json();
      grid.innerHTML = '';
      (data.videos || []).forEach(video => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <div style="position:relative">
            <img src="${esc(video.thumb)}" style="width:100%;aspect-ratio:16/9;object-fit:cover;display:block">
            <span style="position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.75);font-size:11px;padding:2px 6px;border-radius:4px">${esc(video.length)}</span>
          </div>
          <div class="p-3">
            <p class="line-clamp-2 text-sm font-medium mb-2" style="min-height:36px">${esc(video.title)}</p>
            <div class="flex gap-2">
              <button onclick="playVideo('${esc(video.id)}','${escQ(video.title)}')" class="btn-red flex-1 py-2">▶ Lire</button>
              <button onclick="showAddDropdown(event,'${esc(video.id)}','${escQ(video.title)}','${esc(video.thumb)}')" class="btn-ghost flex-1 py-2">+ Ajouter</button>
            </div>
          </div>`;
        grid.appendChild(card);
      });
      if (!data.videos?.length) grid.innerHTML = '<p style="color:var(--muted);font-size:14px;grid-column:1/-1">Aucun résultat.</p>';
    } catch { grid.innerHTML = '<p style="color:var(--red);font-size:14px;grid-column:1/-1">Erreur de connexion.</p>'; }
  }

  // ─── Player ───────────────────────────────────────────────────────────────
  function playVideo(id, title) {
    currentVideoId = id;
    document.getElementById('playerContainer').classList.remove('hidden');
    document.getElementById('videoPlayer').src = `https://www.eporner.com/embed/${id}`;
    document.getElementById('videoTitle').textContent = title;
    // Update playing index from active playlist
    const pl = activePl();
    if (pl) currentPlayingIndex = pl.videos.findIndex(v => v.id === id);
    renderPlaylistItems();
    document.getElementById('playerContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function playAll() {
    const pl = activePl();
    if (!pl || !pl.videos.length) return toast('La playlist est vide');
    currentPlayingIndex = 0;
    const v = pl.videos[0];
    playVideo(v.id, v.title);
  }

  function playNext() {
    const pl = activePl();
    if (!pl) return;
    if (currentPlayingIndex < pl.videos.length - 1) {
      currentPlayingIndex++;
      const v = pl.videos[currentPlayingIndex];
      playVideo(v.id, v.title);
    } else toast('Fin de la playlist');
  }

  function playPrev() {
    const pl = activePl();
    if (!pl) return;
    if (currentPlayingIndex > 0) {
      currentPlayingIndex--;
      const v = pl.videos[currentPlayingIndex];
      playVideo(v.id, v.title);
    } else toast('Début de la playlist');
  }

  // ─── Add dropdown ─────────────────────────────────────────────────────────
  function showAddDropdown(e, id, title, thumb) {
    e.stopPropagation();
    const dd = document.getElementById('addDropdown');
    dd.innerHTML = '';
    const rect = e.target.getBoundingClientRect();

    // "Add to existing"
    Object.entries(playlists).forEach(([pid, pl]) => {
      const item = document.createElement('div');
      item.className = 'dropdown-item';
      const already = pl.videos.some(v => v.id === id);
      item.innerHTML = `<span>${esc(pl.name)}</span> ${already ? '<span style="color:var(--muted);font-size:11px">✓ ajoutée</span>' : `<span style="color:var(--red);font-size:11px">+ Ajouter</span>`}`;
      if (!already) item.onclick = () => { addToPlaylist(pid, id, title, thumb); closeDropdown(); };
      else item.style.opacity = '0.5';
      dd.appendChild(item);
    });

    // "New playlist"
    const sep = document.createElement('div');
    sep.style.cssText = 'height:1px;background:var(--border);margin:4px 0';
    dd.appendChild(sep);
    const newItem = document.createElement('div');
    newItem.className = 'dropdown-item';
    newItem.style.color = 'var(--red)';
    newItem.textContent = '+ Nouvelle playlist';
    newItem.onclick = () => { closeDropdown(); openCreateModal(id, title, thumb); };
    dd.appendChild(newItem);

    const top = rect.bottom + window.scrollY + 4;
    const left = Math.min(rect.left, window.innerWidth - 220);
    dd.style.cssText = `position:fixed;top:${rect.bottom+4}px;left:${left}px`;
    dd.classList.remove('hidden');
    setTimeout(() => document.addEventListener('click', closeDropdown, { once: true }), 10);
  }

  function closeDropdown() { document.getElementById('addDropdown').classList.add('hidden'); }

  // ─── Playlist CRUD ────────────────────────────────────────────────────────
  let pendingAdd = null; // { id, title, thumb }

  function openCreateModal(vid, vtitle, vthumb) {
    modalMode = 'create';
    pendingAdd = vid ? { id: vid, title: vtitle, thumb: vthumb } : null;
    document.getElementById('modalTitle').textContent = 'Nouvelle playlist';
    document.getElementById('modalInput').value = '';
    document.getElementById('modalConfirm').textContent = 'Créer';
    document.getElementById('modalConfirm').onclick = confirmCreate;
    document.getElementById('modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('modalInput').focus(), 50);
  }

  function openRenameModal() {
    const pl = activePl();
    if (!pl) return;
    modalMode = 'rename';
    document.getElementById('modalTitle').textContent = 'Renommer la playlist';
    document.getElementById('modalInput').value = pl.name;
    document.getElementById('modalConfirm').textContent = 'Renommer';
    document.getElementById('modalConfirm').onclick = confirmRename;
    document.getElementById('modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('modalInput').focus(), 50);
  }

  function closeModal() { document.getElementById('modal').classList.add('hidden'); pendingAdd = null; }

  function confirmCreate() {
    const name = document.getElementById('modalInput').value.trim();
    if (!name) return;
    const id = uid();
    playlists[id] = { name, videos: [] };
    activePlaylistId = id;
    if (pendingAdd) { addToPlaylist(id, pendingAdd.id, pendingAdd.title, pendingAdd.thumb, true); }
    save(); renderTabs(); renderPlaylistItems();
    closeModal();
    toast(`Playlist « ${name} » créée ✓`);
  }

  function confirmRename() {
    const name = document.getElementById('modalInput').value.trim();
    if (!name || !activePl()) return;
    playlists[activePlaylistId].name = name;
    save(); renderTabs(); renderPlaylistItems();
    closeModal();
    toast(`Renommée en « ${name} » ✓`);
  }

  function deleteCurrentPlaylist() {
    const pl = activePl();
    if (!pl) return;
    if (Object.keys(playlists).length === 1) { clearCurrentPlaylist(); return; }
    if (!confirm(`Supprimer la playlist « ${pl.name} » ?`)) return;
    delete playlists[activePlaylistId];
    activePlaylistId = Object.keys(playlists)[0];
    save(); renderTabs(); renderPlaylistItems();
    toast('Playlist supprimée');
  }

  function addToPlaylist(pid, id, title, thumb, skipSave) {
    if (!playlists[pid]) return;
    if (playlists[pid].videos.some(v => v.id === id)) { toast('Déjà dans cette playlist'); return; }
    playlists[pid].videos.push({ id, title, thumb });
    if (!skipSave) { save(); renderTabs(); renderPlaylistItems(); }
    toast(`Ajouté à « ${playlists[pid].name} » ✓`);
  }

  function removeFromPlaylist(index) {
    const pl = activePl();
    if (!pl) return;
    pl.videos.splice(index, 1);
    if (currentPlayingIndex >= index) currentPlayingIndex--;
    save(); renderPlaylistItems();
  }

  function clearCurrentPlaylist() {
    const pl = activePl();
    if (!pl || !pl.videos.length) return;
    if (!confirm('Vider cette playlist ?')) return;
    pl.videos = [];
    currentPlayingIndex = -1;
    save(); renderPlaylistItems();
  }

  function switchPlaylist(id) {
    activePlaylistId = id;
    currentPlayingIndex = -1;
    save(); renderTabs(); renderPlaylistItems();
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  function renderTabs() {
    const tabs = document.getElementById('playlistTabs');
    tabs.innerHTML = '';
    Object.entries(playlists).forEach(([id, pl]) => {
      const t = document.createElement('button');
      t.className = 'playlist-tab' + (id === activePlaylistId ? ' active' : '');
      t.innerHTML = `<span>${esc(pl.name)}</span><span style="font-size:10px;opacity:.7">${pl.videos.length}</span>`;
      t.onclick = () => switchPlaylist(id);
      tabs.appendChild(t);
    });
  }

  function renderPlaylistItems() {
    const pl = activePl();
    const container = document.getElementById('playlistItems');
    const header = document.getElementById('plHeader');
    const plName = document.getElementById('plName');
    const plCount = document.getElementById('plCount');
    container.innerHTML = '';

    if (!pl) return;

    header.style.display = 'flex';
    plName.textContent = pl.name;
    plCount.textContent = `${pl.videos.length} vidéo${pl.videos.length !== 1 ? 's' : ''}`;

    if (!pl.videos.length) {
      container.innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">Aucune vidéo. Ajoutez-en depuis la recherche.</p>';
      return;
    }

    pl.videos.forEach((video, index) => {
      const isPlaying = video.id === currentVideoId;
      const item = document.createElement('div');
      item.className = 'pl-item' + (isPlaying ? ' playing' : '');
      item.innerHTML = `
        <img src="${esc(video.thumb)}" style="width:72px;height:48px;object-fit:cover;border-radius:5px;flex-shrink:0">
        <div style="flex:1;min-width:0">
          <div class="flex items-center gap-1.5 mb-1">
            ${isPlaying ? `<div class="now-playing-dot" style="width:6px;height:6px"></div>` : `<span style="color:var(--muted);font-size:11px;flex-shrink:0">${index + 1}.</span>`}
            <p class="line-clamp-1 text-xs font-medium">${esc(video.title)}</p>
          </div>
          <div class="flex gap-1.5 mt-1">
            <button onclick="playVideo('${esc(video.id)}','${escQ(video.title)}');event.stopPropagation()" class="btn-red py-1 px-2 text-xs">▶ Lire</button>
            <button onclick="removeFromPlaylist(${index});event.stopPropagation()" class="btn-ghost py-1 px-2 text-xs" style="color:#e84343">✕</button>
          </div>
        </div>`;
      item.onclick = () => playVideo(video.id, video.title);
      container.appendChild(item);
    });

    // Progress bar
    if (currentPlayingIndex >= 0 && pl.videos.length > 1) {
      const bar = document.createElement('div');
      bar.className = 'progress-bar';
      bar.innerHTML = `<div class="progress-fill" style="width:${((currentPlayingIndex+1)/pl.videos.length*100).toFixed(1)}%"></div>`;
      container.appendChild(bar);
      const prog = document.createElement('p');
      prog.style.cssText = 'font-size:11px;color:var(--muted);text-align:right;margin-top:4px';
      prog.textContent = `${currentPlayingIndex+1} / ${pl.videos.length}`;
      container.appendChild(prog);
    }
  }

  // ─── Utils ────────────────────────────────────────────────────────────────
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function escQ(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // Enter to search
  document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchVideos(); });
  document.getElementById('modalInput').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('modalConfirm').click(); });
  document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
</script>
</body>
</html>
