<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Lecteur Privé</title>
    
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="referrer" content="no-referrer">

    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Zone du lecteur */
        #player-container { 
            background: #000; 
            width: 100%; 
            aspect-ratio: 16/9; 
            max-height: 60vh; 
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-fallback {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0000;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }

        /* Zone Playlist */
        #playlist { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: #1e1e1e; cursor: pointer; border-radius: 5px; overflow: hidden; font-size: 0.8em; transition: 0.2s; }
        .card:hover { transform: scale(1.05); background: #252525; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .card-info { padding: 8px; }
        .active { border: 2px solid #007bff; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="placeholder" style="text-align:center; padding-top:15%;">Sélectionnez une vidéo pour commencer</div>
        <a id="fallback-button" href="#" target="_blank" class="btn-fallback">Ouvrir sur le site source</a>
    </div>

    <div id="playlist">
        <h2>Ma Playlist Automatique</h2>
        <div id="gallery" class="grid">Chargement en cours...</div>
    </div>

    <script>
        const playerContainer = document.getElementById('player-container');
        const fallbackBtn = document.getElementById('fallback-button');
        let localVideoData = []; // Stockage local des données reçues du JSON

function playVideo(index, element) {
    const video = localVideoData[index];
    if (!video || !video.embed_url) return;

    // ASTUCE : On remplace le domaine principal par le sous-domaine de secours de XVideos
    // Cela permet souvent de contourner la sécurité SAMEORIGIN bloquée par GitHub
    let bypassUrl = video.embed_url.replace('www.xvideos.com', 'static-controls.xvideos.com');
    
    console.log("Tentative de bypass sur :", bypassUrl);
    
    playerContainer.innerHTML = `
        <iframe src="${bypassUrl}" 
                width="100%" height="100%" 
                frameborder="0" 
                allowfullscreen 
                allow="autoplay; fullscreen; picture-in-picture">
        </iframe>`;
    
    // On garde le bouton au cas où, mais masqué si ça fonctionne
    playerContainer.appendChild(fallbackBtn);
    fallbackBtn.href = video.link;
    fallbackBtn.style.display = "block"; 
    
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});
}

        // On va chercher le fichier data.json mis à jour par GitHub Actions
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                localVideoData = data; // On garde les données en mémoire
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                
                // On génère la liste en passant l'index (0, 1, 2...) à la fonction de lecture
                data.forEach((v, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${v.thumb}" loading="lazy">
                        <div class="card-info">${v.title.substring(0, 45)}...</div>
                    `;
                    card.onclick = () => playVideo(index, card);
                    gallery.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('gallery').innerHTML = "Erreur : data.json introuvable ou mal formé.";
                console.error(err);
            });
    </script>
</body>
</html>
