<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Hub Privé</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border-radius: 8px; overflow: hidden; transition: transform 0.2s; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .info { padding: 10px; }
        .title { font-size: 0.9em; height: 40px; overflow: hidden; margin-bottom: 10px; }
        .source-badge { font-size: 0.7em; background: #ff9900; color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .btn { display: block; text-align: center; background: #007bff; color: white; text-decoration: none; padding: 8px; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Flux Personnel Gay</h1>
    <div id="gallery" class="grid">Chargement des vidéos...</div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('gallery');
                container.innerHTML = '';
                data.forEach(v => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${v.thumb}" loading="lazy">
                            <div class="info">
                                <div class="title">${v.title}</div>
                                <span class="source-badge">${v.source}</span>
                                <a href="${v.link}" target="_blank" class="btn">Regarder</a>
                            </div>
                        </div>`;
                });
            })
            .catch(err => { document.getElementById('gallery').innerHTML = "Erreur de chargement."; });
    </script>
</body>
</html>
