<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Lecteur Privé</title>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Zone du lecteur */
        #player-container { background: #000; width: 100%; aspect-ratio: 16/9; max-height: 60vh; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Zone Playlist */
        #playlist { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: #1e1e1e; cursor: pointer; border-radius: 5px; overflow: hidden; font-size: 0.8em; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .card-info { padding: 8px; }
        .active { border: 2px solid #007bff; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="placeholder" style="text-align:center; padding-top:20%;">Sélectionnez une vidéo pour commencer</div>
    </div>

    <div id="playlist">
        <h2>Ma Playlist Automatique</h2>
        <div id="gallery" class="grid"></div>
    </div>

    <script>
        const playerContainer = document.getElementById('player-container');
        
function playVideo(url, element) {
    const playerContainer = document.getElementById('player-container');
    let embedUrl = "";

    if (!url) return;

    // Force HTTPS pour éviter l'erreur "Mixed Content" de ta console
    url = url.replace("http://", "https://");

    try {
        if (url.includes('xvideos.com')) {
            // Cette regex va chercher tout ce qui est entre 'video.' et le slash suivant
            // Exemple : video.okfvaldfd69 -> donnera okfvaldfd69
            let match = url.match(/video\.([^/]+)/);
            
            // Si le format est plus classique (video12345)
            if (!match) match = url.match(/video(\d+)/);

            if (match && match[1]) {
                embedUrl = `https://www.xvideos.com/embedframe/${match[1]}`;
            }
        } 
        else if (url.includes('xhamster.com')) {
            const match = url.match(/(xh\w+)/);
            if (match && match[1]) {
                embedUrl = `https://xhamster.com/embed/${match[1]}`;
            }
        }

        if (embedUrl !== "") {
            console.log("Lecture de l'embed corrigé :", embedUrl);
            
            playerContainer.innerHTML = `
                <iframe src="${embedUrl}" 
                        width="100%" height="100%" 
                        frameborder="0" scrolling="no" 
                        allowfullscreen="true"
                        allow="autoplay; fullscreen">
                </iframe>`;
            
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        } else {
            console.log("Echec de l'ID, ouverture directe.");
            window.open(url, '_blank');
        }
    } catch (err) {
        console.error("Erreur de script :", err);
        window.open(url, '_blank');
    }
}
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                data.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${v.thumb}">
                        <div class="card-info">${v.title.substring(0, 40)}...</div>
                    `;
                    card.onclick = () => playVideo(v.link, card);
                    gallery.appendChild(card);
                });
            });
    </script>
</body>
</html>
