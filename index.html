<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eporner Playlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-red-500 mb-6">🎥 Eporner Playlist</h1>

    <!-- Barre de recherche -->
    <div class="flex gap-3 mb-6">
      <input id="searchInput" type="text" placeholder="Rechercher des vidéos..." 
             class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg px-5 py-3 focus:outline-none focus:border-red-500">
      <button onclick="searchVideos()" 
              class="bg-red-600 hover:bg-red-700 px-8 rounded-lg font-medium">
        Chercher
      </button>
    </div>

    <div class="flex gap-6">
      <!-- Zone principale -->
      <div class="flex-1">
        <!-- Player -->
        <div id="playerContainer" class="hidden bg-black rounded-xl overflow-hidden mb-6">
          <iframe id="videoPlayer" width="100%" height="500" allowfullscreen></iframe>
          <div class="p-4">
            <h2 id="videoTitle" class="text-xl font-bold"></h2>
          </div>
        </div>

        <!-- Grille de vidéos -->
        <div id="videoGrid" class="video-grid"></div>
      </div>

      <!-- Sidebar Playlist -->
      <div class="w-96 bg-zinc-900 rounded-xl p-4 border border-zinc-800 h-fit sticky top-4">
        <h2 class="text-lg font-semibold mb-3 flex items-center gap-2">
          📋 Ma Playlist (<span id="playlistCount">0</span>)
        </h2>
        
        <div id="playlistItems" class="max-h-[70vh] overflow-auto space-y-3 mb-4"></div>

        <button onclick="clearPlaylist()" 
                class="w-full bg-zinc-800 hover:bg-zinc-700 py-2 rounded-lg text-sm">
          Vider la playlist
        </button>
      </div>
    </div>
  </div>

  <script>
    let currentPlaylist = [];

    async function searchVideos() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return alert("Entre un mot-clé");

      const grid = document.getElementById('videoGrid');
      grid.innerHTML = '<p class="text-gray-400">Recherche en cours...</p>';

      try {
        const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${encodeURIComponent(query)}&per_page=32&thumbsize=big&order=latest`);
        const data = await res.json();

        grid.innerHTML = '';
        data.videos.forEach(video => {
          const card = document.createElement('div');
          card.className = "bg-zinc-900 rounded-lg overflow-hidden cursor-pointer hover:ring-2 hover:ring-red-500 transition";
          card.innerHTML = `
            <div class="relative">
              <img src="${video.thumb}" class="w-full aspect-video object-cover">
              <span class="absolute bottom-1 right-1 bg-black/70 text-xs px-2 py-1 rounded">${video.length}</span>
            </div>
            <div class="p-3">
              <p class="line-clamp-2 text-sm font-medium mb-2">${video.title}</p>
              <div class="flex gap-2">
                <button onclick="playVideo('${video.id}', '${video.title}')" 
                        class="flex-1 bg-red-600 hover:bg-red-700 py-2 text-sm rounded">Lire</button>
                <button onclick="addToPlaylist('${video.id}', '${video.title}', '${video.thumb}')" 
                        class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-2 text-sm rounded">+ Ajouter</button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        grid.innerHTML = '<p class="text-red-500">Erreur de connexion</p>';
      }
    }

    function playVideo(id, title) {
      document.getElementById('playerContainer').classList.remove('hidden');
      document.getElementById('videoPlayer').src = `https://www.eporner.com/embed/${id}`;
      document.getElementById('videoTitle').textContent = title;
    }

    function addToPlaylist(id, title, thumb) {
      // Évite les doublons
      if (currentPlaylist.some(v => v.id === id)) {
        alert("Déjà dans la playlist !");
        return;
      }

      currentPlaylist.push({ id, title, thumb });
      updatePlaylistUI();
      alert("✅ Vidéo ajoutée à la playlist");
    }

    function updatePlaylistUI() {
      const container = document.getElementById('playlistItems');
      const count = document.getElementById('playlistCount');
      container.innerHTML = '';

      count.textContent = currentPlaylist.length;

      currentPlaylist.forEach((video, index) => {
        const item = document.createElement('div');
        item.className = "flex gap-3 bg-zinc-800 rounded-lg p-2 cursor-pointer hover:bg-zinc-700";
        item.innerHTML = `
          <img src="${video.thumb}" class="w-20 rounded">
          <div class="flex-1 min-w-0">
            <p class="text-sm line-clamp-2">${video.title}</p>
            <div class="flex gap-2 mt-2">
              <button onclick="playVideo('${video.id}', '${video.title}'); event.stopImmediatePropagation()" 
                      class="text-xs bg-red-600 px-3 py-1 rounded">Lire</button>
              <button onclick="removeFromPlaylist(${index}); event.stopImmediatePropagation()" 
                      class="text-xs bg-zinc-700 px-3 py-1 rounded">Suppr</button>
            </div>
          </div>
        `;
        item.onclick = () => playVideo(video.id, video.title);
        container.appendChild(item);
      });
    }

    function removeFromPlaylist(index) {
      currentPlaylist.splice(index, 1);
      updatePlaylistUI();
    }

    function clearPlaylist() {
      if (confirm("Vider toute la playlist ?")) {
        currentPlaylist = [];
        updatePlaylistUI();
      }
    }

    // Bonus : touche Entrée pour chercher
    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') searchVideos();
    });
  </script>
</body>
</html>
