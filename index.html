<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Lecteur Privé</title>
    
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="referrer" content="no-referrer">

    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Zone du lecteur */
        #player-container { 
            background: #000; 
            width: 100%; 
            aspect-ratio: 16/9; 
            max-height: 60vh; 
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-fallback {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0000;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: none; /* Caché par défaut */
        }

        /* Zone Playlist */
        #playlist { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: #1e1e1e; cursor: pointer; border-radius: 5px; overflow: hidden; font-size: 0.8em; transition: 0.2s; }
        .card:hover { transform: scale(1.05); background: #252525; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .card-info { padding: 8px; }
        .active { border: 2px solid #007bff; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="placeholder" style="text-align:center; padding-top:15%;">Sélectionnez une vidéo pour commencer</div>
        <a id="fallback-button" href="#" target="_blank" class="btn-fallback">Ouvrir sur le site source</a>
    </div>

    <div id="playlist">
        <h2>Ma Playlist Automatique</h2>
        <div id="gallery" class="grid">Chargement en cours...</div>
    </div>

    <script>
        const playerContainer = document.getElementById('player-container');
        const fallbackBtn = document.getElementById('fallback-button');

        function playVideo(url, element) {
            let embedUrl = "";

            if (!url) return;

            // Nettoyage de l'URL
            url = url.replace("http://", "https://");

            try {
                if (url.includes('xvideos.com')) {
                    // Regex chirurgicale pour capturer l'ID après 'video.' ou 'video'
                    let match = url.match(/video\.?([^/]+)/);
                    if (match && match[1]) {
                        // On ajoute ?type=video pour forcer le lecteur
                        embedUrl = `https://www.xvideos.com/embedframe/${match[1]}?type=video`;
                    }
                } 
                else if (url.includes('xhamster.com')) {
                    const match = url.match(/(xh\w+)/);
                    if (match && match[1]) {
                        embedUrl = `https://xhamster.com/embed/${match[1]}`;
                    }
                }

                if (embedUrl !== "") {
                    console.log("Tentative de lecture :", embedUrl);
                    
                    // Mise à jour de l'iframe
                    playerContainer.innerHTML = `
                        <iframe src="${embedUrl}" 
                                frameborder="0" 
                                allowfullscreen 
                                allow="autoplay; fullscreen; picture-in-picture">
                        </iframe>`;
                    
                    // On remet le bouton de secours par dessus l'iframe au cas où
                    playerContainer.appendChild(fallbackBtn);
                    fallbackBtn.href = url;
                    fallbackBtn.style.display = "block"; // On l'affiche
                    
                    // Style visuel
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                    element.classList.add('active');
                    window.scrollTo({top: 0, behavior: 'smooth'});
                } else {
                    window.open(url, '_blank');
                }
            } catch (err) {
                console.error("Erreur :", err);
                window.open(url, '_blank');
            }
        }

        // Chargement des données
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                data.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${v.thumb}" loading="lazy">
                        <div class="card-info">${v.title.substring(0, 45)}...</div>
                    `;
                    card.onclick = () => playVideo(v.link, card);
                    gallery.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('gallery').innerHTML = "Erreur : data.json introuvable.";
            });
    </script>
</body>
</html>
